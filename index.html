<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hynux Online Shop Office</title>
    <!-- Memuat Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Memuat React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Memuat Babel untuk membaca JSX di dalam HTML -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Komponen Ikon (Menggantikan lucide-react agar berjalan lancar di satu file HTML)
        const Icon = ({ children, size = 24, className = "", fill = "none" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );

        const Star = (props) => <Icon {...props}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></Icon>;
        const MapPin = (props) => <Icon {...props}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></Icon>;
        const Phone = (props) => <Icon {...props}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></Icon>;
        const Clock = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Icon>;
        const Globe = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"/><line x1="2" x2="22" y1="12" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></Icon>;
        const Share2 = (props) => <Icon {...props}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></Icon>;
        const Navigation = (props) => <Icon {...props}><polygon points="3 11 22 2 13 21 11 13 3 11"/></Icon>;
        const ThumbsUp = (props) => <Icon {...props}><path d="M7 10v12"/><path d="M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2.76a2 2 0 0 0 1.79-1.11L12 2h0a3.13 3.13 0 0 1 3 3.88Z"/></Icon>;
        const ImageIcon = (props) => <Icon {...props}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></Icon>;
        const CheckCircle2 = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></Icon>;

        // Data Ulasan
        const reviewsData = [
            { id: 1, name: "lintang markhamah", meta: "1 ulasan", stars: 5, date: "7 tahun yang lalu", text: "Saya merasa senang atas pelayanan dan barang kualitas yang anda berikan", likes: 0, ownerResponse: null },
            { id: 2, name: "Ari Dwii", meta: "6 ulasan · 8 foto", stars: 5, date: "5 tahun yang lalu", text: "Wah manteb sekali, pelayanan the best. Jika ada kekeliruan dalam pengiriman fast respon. Soal rasa manteb dah, gk sah diragukan lagi. Thank you seller. Semoga amanah. Aamiin...", likes: 1, ownerResponse: { date: "Setahun yang lalu", text: "Terimakasih atas kunjungan dan sudah berbelanja di toko kami. Sehat selalu dan jangan lupa bahagia." } },
            { id: 3, name: "Meilana Lovina", meta: "Local Guide · 12 ulasan · 15 foto", stars: 5, date: "5 tahun yang lalu", text: "Recommended bgt. Pengiriman juga cepat, apalagi di masa pandemi gini. Bener2 memuaskan Next time ga kapok buat order lagi", likes: 0, ownerResponse: null },
            { id: 4, name: "Hendra D K", meta: "Local Guide · 53 ulasan · 36 foto", stars: 5, date: "9 tahun yang lalu", text: "", likes: 0, ownerResponse: null }
        ];

        const reviewKeywords = [
            { text: "quality service", count: 22 }, { text: "delivery", count: 6 },
            { text: "product marketing", count: 4 }, { text: "price", count: 3 }
        ];

        // Komponen Utama
        function App() {
            return (
                <div className="min-h-screen bg-gray-50 font-sans text-gray-800">
                    {/* Hero Banner */}
                    <div className="w-full h-64 md:h-80 relative bg-blue-900">
                        <img 
                            src="https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&q=80&w=1600" 
                            alt="Kantor Hynux Online Shop" 
                            className="w-full h-full object-cover opacity-60"
                        />
                        <div className="absolute bottom-0 left-0 w-full bg-gradient-to-t from-black/80 to-transparent p-6 md:p-10">
                            <div className="max-w-5xl mx-auto">
                                <span className="bg-blue-600 text-white text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider mb-3 inline-block">
                                    Corporate Office
                                </span>
                                <h1 className="text-3xl md:text-5xl font-bold text-white mb-2">Hynux Online Shop Office</h1>
                                <div className="flex items-center text-white space-x-2">
                                    <span className="text-xl font-semibold">4.9</span>
                                    <div className="flex text-yellow-400">
                                        {[...Array(5)].map((_, i) => (
                                            <Star key={i} size={20} fill="currentColor" />
                                        ))}
                                    </div>
                                    <span className="text-gray-300 ml-2">(87 ulasan)</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-5xl mx-auto px-4 py-8 md:px-6">
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            
                            {/* Kolom Kiri: Informasi Utama & Actions */}
                            <div className="lg:col-span-1 space-y-6">
                                {/* Quick Actions */}
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center text-center">
                                    <button className="flex flex-col items-center text-blue-600 hover:text-blue-800 transition">
                                        <div className="w-12 h-12 rounded-full bg-blue-50 flex items-center justify-center mb-2">
                                            <Navigation size={24} />
                                        </div>
                                        <span className="text-sm font-medium">Rute</span>
                                    </button>
                                    <button className="flex flex-col items-center text-blue-600 hover:text-blue-800 transition">
                                        <div className="w-12 h-12 rounded-full bg-blue-50 flex items-center justify-center mb-2">
                                            <Phone size={24} />
                                        </div>
                                        <span className="text-sm font-medium">Telepon</span>
                                    </button>
                                    <button className="flex flex-col items-center text-blue-600 hover:text-blue-800 transition">
                                        <div className="w-12 h-12 rounded-full bg-blue-50 flex items-center justify-center mb-2">
                                            <Share2 size={24} />
                                        </div>
                                        <span className="text-sm font-medium">Bagikan</span>
                                    </button>
                                </div>

                                {/* Informasi Detail */}
                                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 divide-y divide-gray-100">
                                    <div className="p-5 flex items-start space-x-4 hover:bg-gray-50 transition cursor-pointer">
                                        <MapPin className="text-gray-400 shrink-0 mt-1" size={24} />
                                        <div>
                                            <p className="text-gray-700 leading-relaxed">
                                                Bar, Cirebonan, Bandarjo, Kec. Ungaran Bar., Kabupaten Semarang, Jawa Tengah 50517
                                            </p>
                                            <p className="text-sm text-gray-500 mt-1">VCJ5+W4 Bandarjo, Semarang Regency</p>
                                        </div>
                                    </div>
                                    
                                    <div className="p-5 flex items-center space-x-4 hover:bg-gray-50 transition cursor-pointer">
                                        <Clock className="text-gray-400 shrink-0" size={24} />
                                        <div className="flex items-center text-gray-700">
                                            <span className="font-semibold text-green-600 mr-2">Buka</span>
                                            <span>· Tutup pukul 17.00</span>
                                        </div>
                                    </div>

                                    <div className="p-5 flex items-center space-x-4 hover:bg-gray-50 transition cursor-pointer">
                                        <Globe className="text-gray-400 shrink-0" size={24} />
                                        <a href="#" className="text-blue-600 hover:underline">linktr.ee</a>
                                    </div>

                                    <div className="p-5 flex items-center space-x-4 hover:bg-gray-50 transition cursor-pointer">
                                        <Phone className="text-gray-400 shrink-0" size={24} />
                                        <a href="tel:085811400044" className="text-gray-700 hover:text-blue-600 font-medium">0858-1140-0044</a>
                                    </div>
                                </div>

                                {/* Foto Placeholder */}
                                <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                                    <div className="flex items-center justify-between mb-4">
                                        <h3 className="font-bold text-lg">Foto & Video</h3>
                                        <button className="text-blue-600 text-sm font-medium hover:underline flex items-center">
                                            <ImageIcon size={16} className="mr-1" /> Tambah
                                        </button>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div className="bg-gray-200 h-24 rounded-lg flex items-center justify-center">
                                            <span className="text-xs text-gray-500">Tampilan Jalan</span>
                                        </div>
                                        <div className="bg-gray-200 h-24 rounded-lg flex items-center justify-center">
                                            <span className="text-xs text-gray-500">Dari Pemilik</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Kolom Kanan: Ulasan */}
                            <div className="lg:col-span-2 space-y-6">
                                <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-100">
                                    <h2 className="text-2xl font-bold mb-6">Ringkasan Ulasan</h2>
                                    
                                    {/* Rating Overview */}
                                    <div className="flex flex-col md:flex-row items-center md:items-start gap-8 mb-8">
                                        <div className="text-center flex flex-col items-center">
                                            <span className="text-6xl font-bold text-gray-800">4.9</span>
                                            <div className="flex text-yellow-400 my-2">
                                                {[...Array(5)].map((_, i) => (
                                                    <Star key={i} size={24} fill="currentColor" />
                                                ))}
                                            </div>
                                            <span className="text-gray-500 text-sm">{87} ulasan</span>
                                        </div>

                                        <div className="flex-1 w-full space-y-2">
                                            {[5, 4, 3, 2, 1].map((star) => (
                                                <div key={star} className="flex items-center text-sm">
                                                    <span className="w-4">{star}</span>
                                                    <div className="w-full h-3 mx-3 bg-gray-100 rounded-full overflow-hidden">
                                                        <div 
                                                            className="h-full bg-yellow-400 rounded-full" 
                                                            style={{ width: star === 5 ? '90%' : star === 4 ? '10%' : '0%' }}
                                                        ></div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Keyword Badges */}
                                    <div className="flex flex-wrap gap-2 mb-8 border-b border-gray-100 pb-8">
                                        {reviewKeywords.map((kw, index) => (
                                            <span key={index} className="px-4 py-2 bg-blue-50 text-blue-700 rounded-full text-sm font-medium flex items-center shadow-sm">
                                                {kw.text} <span className="ml-2 text-blue-400 text-xs">{kw.count}</span>
                                            </span>
                                        ))}
                                    </div>

                                    {/* Review List */}
                                    <div className="space-y-8">
                                        {reviewsData.map((review) => (
                                            <div key={review.id} className="border-b border-gray-100 last:border-0 pb-8 last:pb-0">
                                                <div className="flex items-center mb-3">
                                                    <div className="w-10 h-10 rounded-full bg-gradient-to-br from-blue-400 to-indigo-600 flex items-center justify-center text-white font-bold text-lg mr-4">
                                                        {review.name.charAt(0).toUpperCase()}
                                                    </div>
                                                    <div>
                                                        <h4 className="font-bold text-gray-800">{review.name}</h4>
                                                        <p className="text-xs text-gray-500">{review.meta}</p>
                                                    </div>
                                                </div>
                                                
                                                <div className="flex items-center mb-2">
                                                    <div className="flex text-yellow-400 mr-2">
                                                        {[...Array(5)].map((_, i) => (
                                                            <Star key={i} size={16} fill={i < review.stars ? "currentColor" : "none"} className={i < review.stars ? "" : "text-gray-300"} />
                                                        ))}
                                                    </div>
                                                    <span className="text-sm text-gray-500">{review.date}</span>
                                                </div>
                                                
                                                {review.text && (
                                                    <p className="text-gray-700 text-sm leading-relaxed mb-4">
                                                        "{review.text}"
                                                    </p>
                                                )}

                                                <div className="flex items-center space-x-4 text-sm text-gray-500 mb-4">
                                                    <button className="flex items-center hover:text-blue-600 transition">
                                                        <ThumbsUp size={16} className="mr-1" /> Suka {review.likes > 0 && `(${review.likes})`}
                                                    </button>
                                                    <button className="flex items-center hover:text-blue-600 transition">
                                                        <Share2 size={16} className="mr-1" /> Bagikan
                                                    </button>
                                                </div>

                                                {review.ownerResponse && (
                                                    <div className="bg-gray-50 rounded-xl p-4 ml-6 border-l-4 border-blue-500">
                                                        <div className="flex items-center justify-between mb-2">
                                                            <span className="font-semibold text-sm text-gray-800 flex items-center">
                                                                <CheckCircle2 size={16} className="text-blue-500 mr-1" />
                                                                Tanggapan dari pemilik
                                                            </span>
                                                            <span className="text-xs text-gray-500">{review.ownerResponse.date}</span>
                                                        </div>
                                                        <p className="text-sm text-gray-700 italic">
                                                            "{review.ownerResponse.text}"
                                                        </p>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Render React ke DOM
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
